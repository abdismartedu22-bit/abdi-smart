<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" id="favicon" />
    <script>
      (function() {
        var img = new Image();
        img.onload = function() {
          var c = document.createElement('canvas');
          c.width = 64; c.height = 64;
          var ctx = c.getContext('2d');
          ctx.beginPath();
          ctx.arc(32, 32, 32, 0, Math.PI * 2);
          ctx.clip();
          ctx.drawImage(img, 0, 0, 64, 64);
          document.getElementById('favicon').href = c.toDataURL('image/png');
        };
        img.src = '/logo.png';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdi Smart Education — Bimbel SNBP & SNBT Bali</title>
    <meta
      name="description"
      content="Abdi Smart Education: bimbel les privat dan grup persiapan SNBP, SNBT, TPS, dan Mapel di Bali. Raih kampus impianmu bersama kami."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,400;0,500;0,700;0,800;0,900;1,900&family=Figtree:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
